# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - kpss_flashcards/**
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    unused_import: warning
    unused_local_variable: warning
    dead_code: warning
    deprecated_member_use: warning

linter:
  rules:
    # ═══════════════════════════════════════════════════════════════════════════
    # PERFORMANS
    # ═══════════════════════════════════════════════════════════════════════════
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: false  # Çok fazla false positive
    use_colored_box: false  # Kademeli düzeltme için kapalı
    prefer_const_constructors: false  # Kademeli düzeltme için kapalı
    prefer_const_literals_to_create_immutables: false  # Kademeli düzeltme için kapalı
    prefer_const_declarations: false  # Kademeli düzeltme için kapalı
    
    # ═══════════════════════════════════════════════════════════════════════════
    # GÜVENLİK
    # ═══════════════════════════════════════════════════════════════════════════
    no_logic_in_create_state: true
    use_key_in_widget_constructors: true
    
    # ═══════════════════════════════════════════════════════════════════════════
    # KOD KALİTESİ
    # ═══════════════════════════════════════════════════════════════════════════
    prefer_final_fields: true
    prefer_final_locals: false  # Kademeli düzeltme için kapalı
    avoid_print: false  # Debug prints allowed (AppLogger kullanılıyor)
    always_declare_return_types: true
    annotate_overrides: true
    avoid_empty_else: true
    avoid_returning_null_for_void: true
    empty_catches: true
    empty_statements: true
    
    # ═══════════════════════════════════════════════════════════════════════════
    # OKUNABİLİRLİK
    # ═══════════════════════════════════════════════════════════════════════════
    prefer_single_quotes: false  # Mevcut kodla uyumsuz
    sort_child_properties_last: true
    use_full_hex_values_for_flutter_colors: true
    unnecessary_brace_in_string_interps: true

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options

name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      app_env:
        description: 'Environment'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - prod

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Generate Env File
        run: |
          ENV_VALUE="${{ github.event.inputs.app_env || 'prod' }}"
          echo "window.APP_ENV = '${ENV_VALUE}';"                         > client/js/env.js
          echo "window.BACKEND_URL = '${{ secrets.BACKEND_URL }}';"       >> client/js/env.js
          echo "Generated env.js: APP_ENV=${ENV_VALUE}, BACKEND_URL set"

      - name: Create Deployment Archive
        run: |
          # Compress the entire project excluding local-only files
          tar -czf deploy.tar.gz client/ server/ assets/

      - name: Transfer Archive to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRIVATE_HOST }}
          username: ${{ secrets.PRIVATE_USER }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/${{ secrets.PRIVATE_USER }}/kpssasistan-admin/${{ github.event.inputs.app_env || 'prod' }}"

      - name: Extract, Configure and Restart Services
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          HASH_SALT: ${{ secrets.HASH_SALT }}
          REVENUECAT_SECRET_KEY: ${{ secrets.REVENUECAT_SECRET_KEY }}
          REVENUECAT_ENTITLEMENT_ID: ${{ secrets.REVENUECAT_ENTITLEMENT_ID }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        with:
          host: ${{ secrets.PRIVATE_HOST }}
          username: ${{ secrets.PRIVATE_USER }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          envs: GH_PAT,OPENROUTER_API_KEY,GEMINI_API_KEY,FIREBASE_SERVICE_ACCOUNT,ADMIN_USERNAME,ADMIN_PASSWORD,HASH_SALT,REVENUECAT_SECRET_KEY,REVENUECAT_ENTITLEMENT_ID,ALLOWED_ORIGINS
          script: |
            DEPLOY_DIR="/home/${{ secrets.PRIVATE_USER }}/kpssasistan-admin/${{ github.event.inputs.app_env || 'prod' }}"
            cd "$DEPLOY_DIR"

            # Extract
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # Write server .env from GitHub Secrets
            {
              printf 'GH_PAT=%s\n'                   "$GH_PAT"
              printf 'OPENROUTER_API_KEY=%s\n'       "$OPENROUTER_API_KEY"
              printf 'GEMINI_API_KEY=%s\n'            "$GEMINI_API_KEY"
              printf 'FIREBASE_SERVICE_ACCOUNT=%s\n' "$FIREBASE_SERVICE_ACCOUNT"
              printf 'ADMIN_USERNAME=%s\n'            "$ADMIN_USERNAME"
              printf 'ADMIN_PASSWORD=%s\n'            "$ADMIN_PASSWORD"
              printf 'HASH_SALT=%s\n'                 "$HASH_SALT"
              printf 'REVENUECAT_SECRET_KEY=%s\n'     "$REVENUECAT_SECRET_KEY"
              printf 'REVENUECAT_ENTITLEMENT_ID=%s\n' "$REVENUECAT_ENTITLEMENT_ID"
              printf 'ALLOWED_ORIGINS=%s\n'              "$ALLOWED_ORIGINS"
            } > server/.env
            chmod 600 server/.env

            # Setup Backend
            cd server
            npm ci --omit=dev
            pm2 restart kpss-backend || pm2 start server.js --name kpss-backend

            # Setup Frontend
            cd ../client
            npm ci --omit=dev
            pm2 restart kpss-frontend || pm2 start "npx serve -l 8001" --name kpss-frontend

            # Health check
            sleep 5
            pm2 list | grep -E "kpss-(backend|frontend)"

      - name: Deploy Frontend to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          npm install -g firebase-tools --silent
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/fb-sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/fb-sa.json \
            firebase deploy --only hosting --project kpss-c5cad
          rm -f /tmp/fb-sa.json
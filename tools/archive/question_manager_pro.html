<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPSS - Soru Yönetici Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --bg3: #334155;
            --accent: #6366f1;
            --success: #22c55e;
            --warn: #f59e0b;
            --error: #ef4444;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --border: #475569
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        .header {
            background: linear-gradient(135deg, var(--accent), #a855f7);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .header h1 {
            font-size: 1.25rem
        }

        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: calc(100vh - 60px)
        }

        .sidebar {
            background: var(--bg2);
            padding: 1rem;
            border-right: 1px solid var(--border);
            overflow-y: auto
        }

        .main {
            padding: 1rem;
            overflow-y: auto
        }

        .card {
            background: var(--bg2);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border)
        }

        .card-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text2);
            margin-bottom: 0.3rem
        }

        select,
        textarea,
        input {
            width: 100%;
            padding: 0.5rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            font-size: 0.8rem
        }

        textarea {
            min-height: 180px;
            font-family: monospace;
            font-size: 0.75rem
        }

        .btn {
            padding: 0.5rem 0.75rem;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s
        }

        .btn-primary {
            background: var(--accent);
            color: white
        }

        .btn-success {
            background: var(--success);
            color: white
        }

        .btn-warn {
            background: var(--warn);
            color: black
        }

        .btn-error {
            background: var(--error);
            color: white
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px)
        }

        .btn-group {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.75rem
        }

        .stat {
            background: var(--bg2);
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border)
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent)
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text2);
            text-transform: uppercase
        }

        .alert {
            padding: 0.6rem;
            border-radius: 5px;
            margin-bottom: 0.5rem;
            font-size: 0.8rem
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--error);
            color: var(--error)
        }

        .alert-warn {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid var(--warn);
            color: var(--warn)
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid var(--success);
            color: var(--success)
        }

        .alert-info {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--accent);
            color: var(--accent)
        }

        .q-card {
            background: var(--bg3);
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-left: 3px solid var(--accent);
            font-size: 0.8rem
        }

        .q-card.error {
            border-left-color: var(--error)
        }

        .q-id {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600
        }

        .q-text {
            margin: 0.4rem 0;
            line-height: 1.4
        }

        .badge {
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.65rem;
            font-weight: 600
        }

        .badge-ok {
            background: var(--success);
            color: white
        }

        .badge-error {
            background: var(--error);
            color: white
        }

        .badge-warn {
            background: var(--warn);
            color: black
        }

        .file-info {
            background: var(--bg3);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 0.75rem
        }

        .file-info strong {
            color: var(--success)
        }

        .tabs {
            display: flex;
            gap: 0.3rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap
        }

        .tab {
            padding: 0.4rem 0.75rem;
            background: var(--bg3);
            border: none;
            color: var(--text2);
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.75rem
        }

        .tab.active {
            background: var(--accent);
            color: white
        }

        .tab-content {
            display: none
        }

        .tab-content.active {
            display: block
        }

        .analysis-row {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem
        }

        .hidden {
            display: none !important
        }

        .progress {
            height: 4px;
            background: var(--bg3);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.3rem
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s
        }

        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🔬 KPSS Soru Yönetici Pro</h1>
        <div class="btn-group">
            <button class="btn btn-success" onclick="openFile()">📂 Dosya Aç</button>
            <button class="btn btn-primary" onclick="saveFile()" id="saveBtn" disabled>💾 Kaydet</button>
        </div>
    </div>

    <div class="container">
        <aside class="sidebar">
            <div id="fileInfo" class="file-info hidden">
                <strong>📄 Açık Dosya:</strong><br>
                <span id="fileName">-</span><br>
                <span style="color:var(--text2)">Mevcut: <strong id="existingCount">0</strong> soru</span>
            </div>

            <div class="card">
                <div class="card-title">➕ Yeni Sorular Ekle</div>
                <textarea id="input" placeholder='Yeni soruları JSON array olarak yapıştırın...'></textarea>
                <div class="btn-group" style="margin-top:0.5rem">
                    <button class="btn btn-primary" onclick="analyze()">🔍 Analiz</button>
                    <button class="btn" style="background:var(--bg3)" onclick="formatJSON()">📐</button>
                    <button class="btn" style="background:var(--bg3)" onclick="clearInput()">🗑️</button>
                </div>
            </div>

            <div class="card">
                <div class="card-title">⚡ İşlemler</div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="mergeAndSave()" id="mergeBtn" disabled>✅ Birleştir &
                        Kaydet</button>
                    <button class="btn btn-warn" onclick="fixIds()">🔄 ID Düzelt</button>
                </div>
                <p style="font-size:0.7rem;color:var(--text2);margin-top:0.5rem">Birleştir: Mevcut dosyaya yeni soruları
                    ekler</p>
            </div>

            <div class="card">
                <div class="card-title">📊 Özet</div>
                <div class="analysis-row"><span>Mevcut Soru</span><strong id="sMevcut">0</strong></div>
                <div class="analysis-row"><span>Yeni Soru</span><strong id="sYeni">0</strong></div>
                <div class="analysis-row"><span>Toplam Olacak</span><strong id="sToplam"
                        style="color:var(--success)">0</strong></div>
                <div class="analysis-row"><span>Hatalı</span><strong id="sHata" style="color:var(--error)">0</strong>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="stats">
                <div class="stat">
                    <div class="stat-val" id="statTotal">0</div>
                    <div class="stat-label">Toplam</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="statValid" style="color:var(--success)">0</div>
                    <div class="stat-label">Geçerli</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="statError" style="color:var(--error)">0</div>
                    <div class="stat-label">Hata</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="statWarn" style="color:var(--warn)">0</div>
                    <div class="stat-label">Uyarı</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="statDup" style="color:var(--warn)">0</div>
                    <div class="stat-label">Duplicate</div>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="showTab('errors')">❌ Hatalar</button>
                <button class="tab" onclick="showTab('duplicates')">🔁 Duplicate</button>
                <button class="tab" onclick="showTab('preview')">👁️ Önizleme</button>
                <button class="tab" onclick="showTab('existing')">📋 Mevcut</button>
            </div>

            <div id="errors" class="tab-content active">
                <div id="errorsContent"></div>
            </div>
            <div id="duplicates" class="tab-content">
                <div id="dupContent"></div>
            </div>
            <div id="preview" class="tab-content">
                <div id="previewContent"></div>
            </div>
            <div id="existing" class="tab-content">
                <div id="existingContent"></div>
            </div>
        </main>
    </div>

    <script>
        let fileHandle = null, existingData = [], newData = [];

        function showTab(id) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active'); document.getElementById(id).classList.add('active'); }

        async function openFile() {
            try {
                [fileHandle] = await window.showOpenFilePicker({ types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
                const file = await fileHandle.getFile();
                const text = await file.text();
                existingData = JSON.parse(text);
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('existingCount').textContent = existingData.length;
                document.getElementById('sMevcut').textContent = existingData.length;
                document.getElementById('fileInfo').classList.remove('hidden');
                document.getElementById('saveBtn').disabled = false;

                // Show existing questions
                let html = '';
                existingData.slice(-10).forEach(q => {
                    html += `<div class="q-card"><div class="q-id">${q.id}</div><div class="q-text">${(q.q || '').substring(0, 100)}...</div></div>`;
                });
                if (existingData.length > 10) html = `<div class="alert alert-info">Son 10 soru gösteriliyor (toplam ${existingData.length})</div>` + html;
                document.getElementById('existingContent').innerHTML = html || 'Soru yok';

                updateSummary();
            } catch (e) { if (e.name !== 'AbortError') alert('Dosya açılamadı: ' + e.message); }
        }

        async function saveFile() {
            if (!fileHandle) return;
            try {
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(existingData, null, 4));
                await writable.close();
                alert('✅ Dosya kaydedildi! (' + existingData.length + ' soru)');
            } catch (e) { alert('Kaydetme hatası: ' + e.message); }
        }

        function analyze() {
            const input = document.getElementById('input').value.trim();
            if (!input) { alert('Soru girin!'); return; }
            try { newData = JSON.parse(input); } catch (e) { alert('JSON Hatası: ' + e.message); return; }
            if (!Array.isArray(newData)) { alert('Array olmalı!'); return; }

            let errors = [], warnings = [], allIds = new Set(existingData.map(q => q.id)), dupIds = [], dupTexts = [];
            const existingTexts = new Set(existingData.map(q => (q.q || '').toLowerCase().trim().substring(0, 50)));

            newData.forEach((q, i) => {
                if (!q.id) errors.push({ i, msg: 'id eksik' });
                if (!q.topicId) errors.push({ i, msg: 'topicId eksik' });
                if (!q.q) errors.push({ i, msg: 'soru metni eksik' });
                if (!q.o || !Array.isArray(q.o)) errors.push({ i, msg: 'seçenekler hatalı' });
                if (q.a === undefined) errors.push({ i, msg: 'cevap (a) eksik' });
                else if (q.a < 0 || q.a > 4) errors.push({ i, msg: 'cevap 0-4 arası olmalı' });
                if (q.o && q.o.length !== 5) warnings.push({ i, msg: `${q.o.length} seçenek` });
                if (!q.e) warnings.push({ i, msg: 'açıklama eksik' });

                // Check duplicate ID with existing
                if (q.id && allIds.has(q.id)) { dupIds.push({ id: q.id, type: 'mevcut' }); }
                allIds.add(q.id);

                // Check duplicate text with existing
                const qText = (q.q || '').toLowerCase().trim().substring(0, 50);
                if (existingTexts.has(qText)) { dupTexts.push({ id: q.id, text: qText }); }
            });

            // Check duplicates within new data
            const newIds = new Set();
            newData.forEach(q => { if (q.id && newIds.has(q.id)) dupIds.push({ id: q.id, type: 'yeni' }); newIds.add(q.id); });

            const validC = newData.length - new Set(errors.map(e => e.i)).size;
            document.getElementById('statTotal').textContent = newData.length;
            document.getElementById('statValid').textContent = validC;
            document.getElementById('statError').textContent = errors.length;
            document.getElementById('statWarn').textContent = warnings.length;
            document.getElementById('statDup').textContent = dupIds.length + dupTexts.length;
            document.getElementById('sYeni').textContent = newData.length;

            updateSummary();

            // Errors
            let errHtml = '';
            if (errors.length === 0) errHtml = '<div class="alert alert-success">✅ Kritik hata yok!</div>';
            errors.forEach(e => errHtml += `<div class="alert alert-error">❌ #${e.i + 1} (${newData[e.i]?.id || '?'}): ${e.msg}</div>`);
            warnings.forEach(w => errHtml += `<div class="alert alert-warn">⚠️ #${w.i + 1}: ${w.msg}</div>`);
            document.getElementById('errorsContent').innerHTML = errHtml;

            // Duplicates
            let dupHtml = '';
            if (dupIds.length) {
                dupHtml += '<div class="alert alert-error">🆔 Duplicate ID\'ler:</div>';
                dupIds.forEach(d => dupHtml += `<div class="q-card error"><strong>${d.id}</strong> - ${d.type} veride var!</div>`);
            }
            if (dupTexts.length) {
                dupHtml += '<div class="alert alert-warn">📝 Benzer Metinler (mevcut veride var):</div>';
                dupTexts.forEach(d => dupHtml += `<div class="q-card" style="border-color:var(--warn)"><strong>${d.id}</strong>: "${d.text}..."</div>`);
            }
            if (!dupHtml) dupHtml = '<div class="alert alert-success">✅ Duplicate yok!</div>';
            document.getElementById('dupContent').innerHTML = dupHtml;

            // Preview
            let prevHtml = '';
            newData.forEach((q, i) => {
                const hasErr = errors.some(e => e.i === i);
                prevHtml += `<div class="q-card ${hasErr ? 'error' : ''}"><div class="q-id">${q.id || '#' + (i + 1)} ${hasErr ? '<span class="badge badge-error">HATA</span>' : ''}</div><div class="q-text">${(q.q || '').substring(0, 120)}...</div></div>`;
            });
            document.getElementById('previewContent').innerHTML = prevHtml || 'Veri yok';

            document.getElementById('mergeBtn').disabled = errors.length > 0;
        }

        function updateSummary() {
            document.getElementById('sToplam').textContent = existingData.length + newData.length;
        }

        async function mergeAndSave() {
            if (!fileHandle || !newData.length) { alert('Önce dosya açın ve soru ekleyin!'); return; }
            if (!confirm(`${newData.length} soru eklenecek. Devam?`)) return;

            existingData = [...existingData, ...newData];
            try {
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(existingData, null, 4));
                await writable.close();
                alert('✅ ' + newData.length + ' soru eklendi! Toplam: ' + existingData.length);
                document.getElementById('existingCount').textContent = existingData.length;
                document.getElementById('sMevcut').textContent = existingData.length;
                document.getElementById('input').value = '';
                newData = [];
                updateSummary();
            } catch (e) { alert('Kaydetme hatası: ' + e.message); }
        }

        function fixIds() {
            if (!newData.length) { alert('Önce analiz edin!'); return; }
            const lastId = existingData.length ? existingData[existingData.length - 1].id : 'tarih_000';
            const match = lastId.match(/(\d+)$/);
            let num = match ? parseInt(match[1]) : 0;
            const prefix = lastId.replace(/\d+$/, '');

            newData.forEach(q => {
                num++;
                q.id = prefix + String(num).padStart(3, '0');
                if (existingData.length && existingData[0].topicId) q.topicId = existingData[0].topicId;
            });
            document.getElementById('input').value = JSON.stringify(newData, null, 2);
            analyze();
        }

        function formatJSON() { try { document.getElementById('input').value = JSON.stringify(JSON.parse(document.getElementById('input').value), null, 2); } catch (e) { } }
        function clearInput() { document.getElementById('input').value = ''; newData = []; updateSummary(); }
    </script>
</body>

</html>

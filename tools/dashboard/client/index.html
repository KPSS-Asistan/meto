<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPSS Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            pointer-events: auto;
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .navbar-brand .material-icons-round {
            font-size: 1.75rem;
            color: var(--primary);
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 64px;
            bottom: 0;
            width: 210px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 0.75rem 0.5rem 1.5rem;
            z-index: 900;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .nav-group-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 0.85rem 0.6rem 0.3rem;
            text-transform: uppercase;
        }

        .nav-tab {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.83rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 7px;
            transition: all 0.15s;
            pointer-events: auto;
            user-select: none;
            width: 100%;
            text-align: left;
            white-space: nowrap;
        }

        .nav-tab:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--text-primary);
        }

        .nav-tab.active {
            background: rgba(99, 102, 241, 0.18);
            color: #a5b4fc;
            font-weight: 600;
        }

        .nav-tab.active .material-icons-round {
            color: #818cf8;
        }

        .nav-tab .material-icons-round {
            font-size: 1.05rem;
            color: var(--text-muted);
            transition: color 0.15s;
        }

        .nav-tab:hover .material-icons-round {
            color: var(--text-primary);
        }

        /* MAIN */
        .main-container {
            margin-left: 210px;
            padding: 1.5rem 2rem;
            min-width: 0;
        }

        /* AI Page Two-Panel */
        .ai-layout {
            display: grid;
            grid-template-columns: 310px 1fr;
            gap: 1rem;
            align-items: start;
        }

        .ai-left-panel {
            position: sticky;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media (max-width: 1100px) {
            .ai-layout {
                grid-template-columns: 1fr;
            }

            .ai-left-panel {
                position: static;
            }
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        .mod-lesson-topics {
            display: none;
        }

        .mod-lesson-group.open .mod-lesson-topics {
            display: block;
        }

        .mod-lesson-group.open .mod-chevron {
            transform: rotate(180deg);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-title .material-icons-round {
            font-size: 2rem;
            color: var(--primary);
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* CARDS */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.125rem;
            font-weight: 600;
        }

        .card-title .material-icons-round {
            color: var(--primary);
        }

        /* GRID */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            .grid-4 {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        /* STATS */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.15);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* FORM */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-select {
            max-height: 300px;
            overflow-y: auto;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-textarea {
            min-height: 400px;
            font-family: 'Consolas', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            resize: vertical;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .btn .material-icons-round {
            font-size: 1.125rem;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        /* EDITOR LAYOUT */
        .editor-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .editor-layout {
                grid-template-columns: 1fr;
            }
        }

        /* SYNC CARD */
        .sync-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, rgba(99, 102, 241, 0.05) 100%);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .sync-status .material-icons-round {
            color: var(--success);
        }

        .sync-status-text {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.show {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.warning {
            border-left: 4px solid var(--warning);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Loading Spinner Animation */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">
                <span class="material-icons-round">admin_panel_settings</span>
                KPSS Admin
            </div>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <button class="nav-tab active" onclick="showPage('dashboard')" data-page="dashboard">
            <span class="material-icons-round">dashboard</span>Genel
        </button>

        <div class="nav-group-label">AI İçerik</div>
        <button class="nav-tab" onclick="showPage('ai-content')" data-page="ai-content">
            <span class="material-icons-round">smart_toy</span>AI Üretimi
        </button>
        <button class="nav-tab" onclick="showPage('drafts')" data-page="drafts">
            <span class="material-icons-round">inbox</span>Taslaklar
        </button>
        <button class="nav-tab" onclick="showPage('content-stats')" data-page="content-stats">
            <span class="material-icons-round">bar_chart</span>İçerik İstat.
        </button>
        <button class="nav-tab" onclick="showPage('cost-tracker')" data-page="cost-tracker">
            <span class="material-icons-round">payments</span>Maliyet
        </button>
        <button class="nav-tab" onclick="showPage('search')" data-page="search">
            <span class="material-icons-round">search</span>Arama
        </button>
        <button class="nav-tab" onclick="showPage('nightly')" data-page="nightly">
            <span class="material-icons-round">bedtime</span>Gece Üretim
        </button>

        <div class="nav-group-label">İçerik</div>
        <button class="nav-tab" onclick="showPage('browse')" data-page="browse">
            <span class="material-icons-round">folder_open</span>Sorular
        </button>
        <button class="nav-tab" onclick="showPage('add')" data-page="add">
            <span class="material-icons-round">add_circle</span>Soru Ekle
        </button>
        <button class="nav-tab" onclick="showPage('quality-check')" data-page="quality-check">
            <span class="material-icons-round">fact_check</span>Kalite Kontrol
        </button>

        <div class="nav-group-label">Modüller</div>
        <button class="nav-tab" onclick="showPage('modules')" data-page="modules">
            <span class="material-icons-round">widgets</span>Tüm Modüller
        </button>

        <div class="nav-group-label">Yönetim</div>
        <button class="nav-tab" onclick="showPage('force-update')" data-page="force-update">
            <span class="material-icons-round">system_update</span>Force Update
        </button>
        <button class="nav-tab" onclick="showPage('users')" data-page="users">
            <span class="material-icons-round">people</span>Kullanıcılar
        </button>
        <button class="nav-tab" onclick="showPage('reports')" data-page="reports">
            <span class="material-icons-round">report</span>Raporlar
        </button>
        <button class="nav-tab" onclick="showPage('notifications')" data-page="notifications">
            <span class="material-icons-round">notifications</span>Bildirimler
        </button>
        <button class="nav-tab" onclick="showPage('update')" data-page="update">
            <span class="material-icons-round">system_update</span>Güncelleme
        </button>
        <button class="nav-tab" onclick="showPage('feedbacks')" data-page="feedbacks">
            <span class="material-icons-round">feedback</span>Geri Bildirim
        </button>
    </aside>

    <!-- MAIN CONTAINER -->
    <div class="main-container">

        <!-- DASHBOARD -->
        <div id="page-dashboard" class="page active">
            <div class="page-header">
                <h1 class="page-title">
                    <span class="material-icons-round">dashboard</span>
                    Genel Bakış
                </h1>
                <p class="page-subtitle">Tüm modüllerin özeti</p>
            </div>

            <div class="grid-4" style="margin-bottom: 2rem;">
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--primary);" id="statQuestions">-</div>
                    <div class="stat-label">Sorular</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--success);" id="statFlashcards">-</div>
                    <div class="stat-label">Flashcards</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--warning);" id="statStories">-</div>
                    <div class="stat-label">Hikayeler</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: var(--danger);" id="statGames">-</div>
                    <div class="stat-label">Eşleştirme</div>
                </div>
            </div>





        </div>

    </div>

    <!-- TOAST -->
    <div id="toast" class="toast">
        <span class="material-icons-round">check_circle</span>
        <span id="toastMessage">İşlem başarılı</span>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:10000; align-items:center; justify-content:center; padding:1.5rem;">
        <div
            style="background:var(--bg-card); border-radius:20px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto; padding:2rem; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.3); border:1px solid var(--border);">
            <button onclick="closeEditModal()"
                style="position:absolute; top:1.5rem; right:1.5rem; background:var(--bg-hover); border:1px solid var(--border); color:var(--text-muted); cursor:pointer; font-size:1.5rem; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all 0.2s;"
                onmouseover="this.style.background='var(--primary)'; this.style.color='white';"
                onmouseout="this.style.background='var(--bg-hover)'; this.style.color='var(--text-muted)';">&times;</button>
            <h2 style="margin-bottom:1.5rem; color:var(--text); font-size:1.5rem; font-weight:600;">Soru Düzenle</h2>
            <input type="hidden" id="editQuestionId">
            <input type="hidden" id="editTopicId">
            <div style="margin-bottom:1.25rem;">
                <label style="display:block; margin-bottom:0.5rem; color:var(--text); font-weight:500;">Alt Konu
                    ID</label>
                <input type="text" id="editSubtopicId"
                    style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; transition:border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--primary)';" onblur="this.style.borderColor='var(--border)';">
            </div>
            <div style="margin-bottom:1.25rem;">
                <label style="display:block; margin-bottom:0.5rem; color:var(--text); font-weight:500;">Alt Konu
                    Adı</label>
                <input type="text" id="editSubtopic"
                    style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; transition:border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--primary)';" onblur="this.style.borderColor='var(--border)';">
            </div>
            <div style="margin-bottom:1.25rem;">
                <label style="display:block; margin-bottom:0.5rem; color:var(--text); font-weight:500;">Soru
                    Metni</label>
                <textarea id="editQuestionText" rows="3"
                    style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; resize:vertical; transition:border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--primary)';"
                    onblur="this.style.borderColor='var(--border)';"></textarea>
            </div>
            <div style="margin-bottom:1.25rem;">
                <label
                    style="display:block; margin-bottom:0.5rem; color:var(--text); font-weight:500;">Seçenekler</label>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
                    <input type="text" id="editOpt0" placeholder="A"
                        style="padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; transition:border-color 0.2s;"
                        onfocus="this.style.borderColor='var(--primary)';"
                        onblur="this.style.borderColor='var(--border)';">
                    <input type="text" id="editOpt1" placeholder="B"
                        style="padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; transition:border-color 0.2s;"
                        onfocus="this.style.borderColor='var(--primary)';"
                        onblur="this.style.borderColor='var(--border)';">
                    <input type="text" id="editOpt2" placeholder="C"
                        style="padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; transition:border-color 0.2s;"
                        onfocus="this.style.borderColor='var(--primary)';"
                        onblur="this.style.borderColor='var(--border)';">
                    <input type="text" id="editOpt3" placeholder="D"
                        style="padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; transition:border-color 0.2s;"
                        onfocus="this.style.borderColor='var(--primary)';"
                        onblur="this.style.borderColor='var(--border)';">
                    <input type="text" id="editOpt4" placeholder="E"
                        style="padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; transition:border-color 0.2s;"
                        onfocus="this.style.borderColor='var(--primary)';"
                        onblur="this.style.borderColor='var(--border)';">
                </div>
            </div>
            <div style="margin-bottom:1.25rem;">
                <label style="display:block; margin-bottom:0.5rem; color:var(--text); font-weight:500;">Doğru
                    Cevap</label>
                <select id="editCorrectAns"
                    style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; cursor:pointer;">
                    <option value="0">A</option>
                    <option value="1">B</option>
                    <option value="2">C</option>
                    <option value="3">D</option>
                    <option value="4">E</option>
                </select>
            </div>
            <div style="margin-bottom:1.5rem;">
                <label style="display:block; margin-bottom:0.5rem; color:var(--text); font-weight:500;">Açıklama</label>
                <textarea id="editExplanation" rows="3"
                    style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:0.95rem; resize:vertical; transition:border-color 0.2s;"
                    onfocus="this.style.borderColor='var(--primary)';"
                    onblur="this.style.borderColor='var(--border)';"></textarea>
            </div>
            <div style="display:flex; gap:0.75rem; justify-content:flex-end;">
                <button onclick="closeEditModal()"
                    style="padding:0.75rem 1.5rem; border-radius:10px; background:var(--bg-hover); border:1px solid var(--border); color:var(--text); cursor:pointer; font-weight:500; transition:all 0.2s;"
                    onmouseover="this.style.background='var(--bg)';"
                    onmouseout="this.style.background='var(--bg-hover)';">İptal</button>
                <button onclick="saveEditedQuestion()"
                    style="padding:0.75rem 2rem; border-radius:10px; background:linear-gradient(135deg,var(--primary),#3b82f6); border:none; color:white; cursor:pointer; font-weight:600; transition:all 0.2s; box-shadow:0 4px 12px rgba(59,130,246,0.3);"
                    onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 6px 20px rgba(59,130,246,0.4)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(59,130,246,0.3)';">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS - Consolidated into single bundle -->
    <script src="js/app-all.js?v=66"></script>

    <!-- LIVE RELOAD -->
    <script>
        (function() {
            let isFirstConnect = true;
            function connect() {
                const source = new EventSource('/dev-reload');
                source.onopen = () => {
                    console.log('⚡ Live Reload connected');
                    if (!isFirstConnect) {
                        console.log('🔄 Server restarted, reloading...');
                        window.location.reload();
                    }
                    isFirstConnect = false;
                };
                source.onerror = () => {
                    source.close();
                    // Server is down, try to reconnect every 1s
                    setTimeout(connect, 1000);
                };
            }
            connect();
        })();
    </script>
